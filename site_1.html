        :root {

        .brand-title { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--text-main); }
        .brand-title span { color: var(--brand-color); }
        .meta-tag { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--brand-color); font-weight: 700; letter-spacing: 1px; }
        
        .main-container { max-width: 650px; margin: 0 auto; border: 1px solid var(--border-primary); background: linear-gradient(180deg, var(--bg-surface) 0%, var(--bg-card) 100%); border-radius: 16px; padding: 45px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); text-align: left; position: relative; }
        
        .status-badge { background: rgba(255, 0, 60, 0.05); color: var(--brand-color); padding: 6px 14px; font-size: 0.7rem; font-weight: 900; border-radius: 4px; display: inline-block; margin-bottom: 25px; border: 1px solid rgba(255, 0, 60, 0.15); letter-spacing: 1.5px; font-family: 'Orbitron', sans-serif; }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; letter-spacing: -0.5px; line-height: 1.1; }
        p { color: var(--text-dim); font-size: 1rem; line-height: 1.6; margin-bottom: 35px; }
        
        .media-container { width: 100%; height: 350px; background: #080808; border: 1px solid var(--border-primary); border-radius: 8px; margin-bottom: 35px; display: flex; justify-content: center; align-items: center; padding: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.6); }
        .media-container img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 15px rgba(0,0,0,0.7)); }
        
        .btn-premium { background: var(--brand-color); color: var(--text-main); text-decoration: none; padding: 18px 36px; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; border-radius: 6px; display: block; width: 100%; text-align: center; font-family: 'Orbitron', sans-serif; box-shadow: 0 4px 20px rgba(255, 0, 60, 0.2); transition: all 0.3s ease; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255, 0, 60, 0.4); filter: brightness(1.1); }
